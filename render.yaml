services:
  - type: web
    name: grant-writing-platform
    runtime: docker
    plan: free
    env:
      - key: PORT
        value: "5000"
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
    healthCheckPath: /api/health
    dockerfilePath: ./Dockerfile
    autoDeploy: true